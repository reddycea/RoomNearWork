{% extends 'base.html' %}{% block content %}<section class='auth-page'><form method='post' class='auth-card'><h1>Support</h1><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><label>Email<input name='email' type='email' value='{{ current_user.email if current_user.is_authenticated else "" }}' required></label><label>Subject<input name='subject' required></label><label>Message<textarea name='message' required></textarea></label><button>Create ticket</button></form></section>{% endblock %}
