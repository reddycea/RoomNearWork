{% extends 'base.html' %}
{% block title %}Apply — RNW{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Apply for {{ property.title }}</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Monthly income <input name="monthly_income" type="number" step="0.01"></label>
    <label>Employment status <input name="employment_status"></label>
    <label>Employer <input name="employer_name"></label>
    <label>Years employed <input name="years_employed" type="number" step="0.1"></label>
    <label>Move-in date <input name="move_in_date" type="date"></label>
    <label>Lease term <input name="lease_term" type="number" value="12"></label>
    <label>Occupants <input name="number_of_occupants" type="number" value="1"></label>
    <label class="inline"><input name="has_pets" type="checkbox"> I have pets</label>
    <label>Message <textarea name="message"></textarea></label>
    <button>Submit application</button>
  </form>
</section>
{% endblock %}
