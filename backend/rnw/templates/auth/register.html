{% extends 'base.html' %}{% block content %}<section class='auth-page'><form method='post' class='auth-card'><h1>Create your RNW account</h1><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><label>Full name<input name='full_name' required></label><label>Email<input name='email' type='email' required></label><label>Password<input name='password' type='password' required></label><button>Continue</button><p>Already registered? <a href='{{ url_for('auth.login') }}'>Log in</a></p></form></section>{% endblock %}
