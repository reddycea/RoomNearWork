{% extends 'base.html' %}
{% block content %}
<section class="auth-page">
  <form method="post" class="auth-card">
    <h1>Create your RNW account</h1>
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>ID number<input name="id_number" required maxlength="20" autocomplete="off"></label>
    <label> Phone number<input name="phone" type="tel" required autocomplete="tel"> </label>
    <label>Email<input name="email" type="email" required autocomplete="email"></label>
    <label> First name <input name="first_name" required autocomplete="given-name"> </label>
    <label> Last name<input name="last_name" required autocomplete="family-name"></label>
    <label>Password<input name="password" type="password" required autocomplete="new-password"></label> 
    <label> Confirm password<input name="confirm_password" type="password" required autocomplete="new-password"></label>
    <label>Reference code<input name="reference_code" autocomplete="off">
    </label><button>Create account</button><p>Already registered? <a href="{{ url_for('auth.login') }}">Log in</a></p>
  </form>
</section>
{% endblock %}
