{% extends 'base.html' %}
{% block title %}Login — RNW{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Login</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>Email <input name="email" type="email" required></label>
    <label>Password <input name="password" type="password" required></label>
    <label class="inline"><input name="remember" type="checkbox"> Remember me</label>
    <button>Login</button>
  </form>
  <p class="muted"><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a> · <a href="{{ url_for('auth.resend_verification') }}">Resend verification email</a></p>
</section>
{% endblock %}
