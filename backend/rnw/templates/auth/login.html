{% extends 'base.html' %}{% block content %}<section class='auth-page'><form method='post' class='auth-card'><h1>Log in</h1><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><label>Email<input name='email' type='email' required></label><label>Password<input name='password' type='password' required></label><label class='check'><input type='checkbox' name='remember'> Remember me</label><button>Log in</button><p>No account? <a href='{{ url_for('auth.register') }}'>Sign up</a></p><p><a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a></p></form></section>{% endblock %}
