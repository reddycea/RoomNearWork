{% extends 'base.html' %}
{% block title %}Landlord verification — RNW{% endblock %}
{% block content %}
<section class="panel narrow">
  <h1>Landlord verification</h1>
  {% if verification %}<p class="muted">Current status: {{ verification.status }}</p>{% endif %}
  <p class="muted">Documents are stored privately and only admins can download them.</p>
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label>ID document <input name="id_document" type="file" accept=".pdf,image/*" required></label>
    <label>Proof of address <input name="proof_of_address" type="file" accept=".pdf,image/*" required></label>
    <label>Tax clearance <input name="tax_clearance" type="file" accept=".pdf,image/*"></label>
    <label>Business registration <input name="business_registration" type="file" accept=".pdf,image/*"></label>
    <button>Submit verification</button>
  </form>
</section>
{% endblock %}
