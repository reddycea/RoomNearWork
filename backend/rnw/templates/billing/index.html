{% extends 'base.html' %}{% block content %}<section class='dashboard'><h1>Billing</h1><div class='cards'>{% for plan in plans %}<article class='property-card'><div class='card-body'><h3>{{ plan.name }}</h3><p>R{{ plan.price_cents // 100 }} / month</p><form method='post' action='{{ url_for('billing.subscribe', plan_id=plan.id) }}'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><button>Subscribe</button></form></div></article>{% endfor %}</div></section>{% endblock %}
