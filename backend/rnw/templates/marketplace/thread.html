{% extends 'base.html' %}{% block content %}<section class='dashboard narrow'><h1>{{ thread.property.title }}</h1><div class='chat-panel'>{% for m in thread.messages %}<div class='message {% if m.sender_id == current_user.id %}mine{% endif %}'><p>{{ m.body }}</p><small>{{ m.sender.full_name }}</small></div>{% endfor %}</div><form method='post' class='message-form'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><textarea name='body' placeholder='Write a message'></textarea><button>Send</button></form></section>{% endblock %}
