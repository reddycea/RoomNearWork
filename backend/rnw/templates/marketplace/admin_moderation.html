{% extends 'base.html' %}{% block content %}<section class='dashboard'><h1>Moderation queue</h1><div class='panel list'>{% for p in pending %}<div><strong>{{ p.title }}</strong><br>{{ p.public_location() }} • R{{ p.rent_amount }}<form method='post' action='{{ url_for('admin.moderate_property', property_id=p.id, action='approve') }}'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><button class='small'>Approve</button></form><form method='post' action='{{ url_for('admin.moderate_property', property_id=p.id, action='reject') }}'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><button class='small secondary'>Reject</button></form></div>{% else %}<p>No pending listings.</p>{% endfor %}</div></section>{% endblock %}
