{% extends 'base.html' %}{% block content %}<section class='dashboard'><h1>Viewings</h1><div class='panel list'>{% for a in appointments %}<div><strong>{{ a.property.title }}</strong><br>{{ a.requested_start }} • {{ a.status }}{% if current_user.role == 'landlord' and a.status == 'pending' %}<form method='post' action='{{ url_for('marketplace.viewing_action', appointment_id=a.id, action='approved') }}'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><button class='small'>Approve</button></form><form method='post' action='{{ url_for('marketplace.viewing_action', appointment_id=a.id, action='rejected') }}'><input type='hidden' name='csrf_token' value='{{ csrf_token() }}'><button class='small secondary'>Reject</button></form>{% endif %}</div>{% else %}<p>No viewing appointments.</p>{% endfor %}</div></section>{% endblock %}
