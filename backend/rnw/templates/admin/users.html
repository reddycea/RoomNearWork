{% extends 'base.html' %}
{% block title %}Users — RNW{% endblock %}
{% block content %}
<h1>Users</h1>
<table>
  <tr><th>Name</th><th>Email</th><th>Role</th><th>Active</th><th>Action</th></tr>
  {% for user in users %}
  <tr><td>{{ user.full_name }}</td><td>{{ user.email }}</td><td>{{ user.role }}</td><td>{{ user.is_active }}</td><td>
    {% if user.is_active %}<form class="inline-form" method="post" action="{{ url_for('admin.user_action', user_id=user.id, action='suspend') }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button>Suspend</button></form>{% else %}<form class="inline-form" method="post" action="{{ url_for('admin.user_action', user_id=user.id, action='activate') }}"><input type="hidden" name="csrf_token" value="{{ csrf_token() }}"><button>Activate</button></form>{% endif %}
  </td></tr>
  {% endfor %}
</table>
{% endblock %}
