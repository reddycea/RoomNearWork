services:
  web:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./backend/rnw/static:/app/backend/rnw/static:ro
  worker:
    build: .
    command: python scripts/run_worker.py
    env_file: .env
    depends_on:
      - redis
      - db
    volumes:
      - ./uploads:/app/uploads
  scheduler:
    build: .
    command: python scripts/run_scheduler.py
    env_file: .env
    depends_on:
      - web
      - redis
      - db
    volumes:
      - ./uploads:/app/uploads
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rnw
      POSTGRES_USER: rnw
      POSTGRES_PASSWORD: change-db-password
    volumes:
      - pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/rnw/static:/app/backend/rnw/static:ro
      - ./uploads:/app/uploads:ro
    ports:
      - "80:80"
    depends_on:
      - web
volumes:
  pgdata:
