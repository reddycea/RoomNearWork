# Render Blueprint for Room Near Work
# Docs: https://render.com/docs/blueprint-spec
# After importing this Blueprint, fill all sync:false values in the Render Dashboard.

services:
  - type: web
    name: room-near-work-web
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: gunicorn -c gunicorn.conf.py "backend.app:create_app()"
    preDeployCommand: flask --app backend.app:create_app db upgrade
    initialDeployHook: flask --app backend.app:create_app seed-db
    healthCheckPath: /health
    maxShutdownDelaySeconds: 120
    disk:
      name: rnw-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: PORT
        value: 10000
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: room-near-work-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: room-near-work-redis
          property: connectionString
      - key: RATELIMIT_STORAGE_URI
        fromService:
          type: keyvalue
          name: room-near-work-redis
          property: connectionString
      - key: UPLOAD_FOLDER_PATH
        value: /var/data/uploads
      - key: APP_BASE_URL
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GOOGLE_MAPS_BROWSER_KEY
        sync: false
      - key: GOOGLE_MAPS_REGION
        value: ZA
      - key: GOOGLE_MAPS_LANGUAGE
        value: en-ZA
      - key: GOOGLE_ROUTE_MATRIX_ENABLED
        value: true
      - key: DEFAULT_SEARCH_RADIUS_KM
        value: 20
      - key: DEFAULT_MAX_TRAVEL_MINUTES
        value: 45
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false
      - key: PAYMENT_PROVIDER
        value: payfast
      - key: PAYFAST_SANDBOX
        value: true
      - key: PAYFAST_MERCHANT_ID
        sync: false
      - key: PAYFAST_MERCHANT_KEY
        sync: false
      - key: PAYFAST_PASSPHRASE
        sync: false
      - key: TENANT_MONTHLY_PRICE
        value: 50
      - key: LANDLORD_MONTHLY_PRICE
        value: 100
      - key: LANDLORD_MAX_LISTINGS
        value: 25
      - key: SUBSCRIPTION_CURRENCY
        value: ZAR
      - key: EMAIL_VERIFICATION_REQUIRED
        value: true
      - key: ADMIN_2FA_REQUIRED
        value: true
      - key: LISTING_EXPIRES_DAYS
        value: 30
      - key: SAVED_SEARCH_ALERTS_ENABLED
        value: true
      - key: RUN_JOBS_INLINE
        value: false
      - key: MAX_UPLOAD_MB
        value: 12
      - key: UPLOAD_STORAGE_BACKEND
        value: local
      - key: PROXY_FIX_ENABLED
        value: true
      - key: PROXY_FIX_X_FOR
        value: 1
      - key: PROXY_FIX_X_PROTO
        value: 1
      - key: PROXY_FIX_X_HOST
        value: 1
      - key: SESSION_COOKIE_SECURE
        value: true
      - key: REMEMBER_COOKIE_SECURE
        value: true
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: /var/data/logs/rnw.log

  - type: worker
    name: room-near-work-worker
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/run_worker.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: room-near-work-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: room-near-work-redis
          property: connectionString
      - key: UPLOAD_FOLDER_PATH
        value: /var/data/uploads
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

  - type: cron
    name: room-near-work-saved-search-alerts
    runtime: docker
    region: frankfurt
    plan: starter
    schedule: '0 * * * *'
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/run_saved_search_alerts.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: room-near-work-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: room-near-work-redis
          property: connectionString
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_PORT
        value: 587
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_DEFAULT_SENDER
        sync: false

  - type: cron
    name: room-near-work-expire-listings
    runtime: docker
    region: frankfurt
    plan: starter
    schedule: '15 * * * *'
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: python scripts/expire_listings.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: SECRET_KEY
      - key: JWT_SECRET_KEY
        fromService:
          type: web
          name: room-near-work-web
          envVarKey: JWT_SECRET_KEY
      - key: DATABASE_URL
        fromDatabase:
          name: room-near-work-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: room-near-work-redis
          property: connectionString

  - type: keyvalue
    name: room-near-work-redis
    region: frankfurt
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: room-near-work-db
    databaseName: rnw
    user: rnw
    region: frankfurt
    plan: basic-256mb
    postgresMajorVersion: "17"
    ipAllowList: []
